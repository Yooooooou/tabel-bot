version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tabel
      POSTGRES_USER: tabel
      POSTGRES_PASSWORD: tabel_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  bot:
    build: .
    restart: unless-stopped
    depends_on:
      - db
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      ADMIN_CHAT_ID: ${ADMIN_CHAT_ID}
      SPREADSHEET_ID: ${SPREADSHEET_ID}
      GOOGLE_CREDS_JSON: ${GOOGLE_CREDS_JSON}
      WEBHOOK_URL: ${WEBHOOK_URL}
      DATABASE_URL: postgres://tabel:tabel_secret@db:5432/tabel
    ports:
      - "8000:8000"

volumes:
  pgdata:
