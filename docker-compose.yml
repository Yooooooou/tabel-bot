version: "3.9"

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tabelbot
      POSTGRES_USER: tabelbot
      POSTGRES_PASSWORD: tabelbot
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tabelbot"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://tabelbot:tabelbot@db:5432/tabelbot
    ports:
      - "8000:8000"
    volumes:
      # Монтируем credentials.json снаружи (не хранить в образе)
      - ./credentials.json:/app/credentials.json:ro

volumes:
  pgdata:
